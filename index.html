<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farol Velho - Links</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#050505;
      --card:#0d0d0d;
      --gold:#e2d3b0;
      --gold-soft:#c9b792;
      --border:rgba(255,255,255,0.06);
    }

    body{
      min-height:100vh;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      overflow-x:hidden;
      color:white;
      position:relative;
    }

    body::before{
      content:'';
      position:fixed;
      width:700px;
      height:700px;
      background:radial-gradient(circle, rgba(226,211,176,0.10), transparent 70%);
      top:-200px;
      left:-200px;
      animation:float 10s ease-in-out infinite alternate;
      z-index:-2;
    }

    body::after{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle, rgba(226,211,176,0.06), transparent 70%);
      bottom:-200px;
      right:-200px;
      animation:float2 12s ease-in-out infinite alternate;
      z-index:-2;
    }

    @keyframes float{
      from{
        transform:translateY(0px) translateX(0px);
      }
      to{
        transform:translateY(40px) translateX(40px);
      }
    }

    @keyframes float2{
      from{
        transform:translateY(0px) translateX(0px);
      }
      to{
        transform:translateY(-40px) translateX(-30px);
      }
    }

    .particles{
      position:fixed;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:-1;
    }

    .particles span{
      position:absolute;
      display:block;
      width:3px;
      height:3px;
      background:rgba(255,255,255,0.2);
      border-radius:50%;
      animation:particles 15s linear infinite;
    }

    @keyframes particles{
      0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
      }

      10%{
        opacity:1;
      }

      100%{
        transform:translateY(-10vh) scale(1);
        opacity:0;
      }
    }

    .container{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .card{
      width:100%;
      max-width:480px;
      background:rgba(12,12,12,0.75);
      border:1px solid var(--border);
      backdrop-filter:blur(20px);
      border-radius:30px;
      padding:40px 30px;
      box-shadow:
      0 0 40px rgba(0,0,0,0.7),
      0 0 80px rgba(226,211,176,0.04);
      animation:fadeUp 1s ease;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(
      135deg,
      rgba(255,255,255,0.03),
      transparent 40%
      );
      pointer-events:none;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:100%;
      display:flex;
      justify-content:center;
      margin-bottom:10px;
    }

    .logo img{
      width:100%;
      max-width:320px;
      filter:drop-shadow(0 0 20px rgba(226,211,176,0.08));
      animation:logoFloat 5s ease-in-out infinite;
    }

    @keyframes logoFloat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-8px);
      }
    }

    .subtitle{
      text-align:center;
      color:rgba(255,255,255,0.55);
      font-size:0.95rem;
      margin-bottom:35px;
      letter-spacing:1px;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .link-btn{
      position:relative;
      text-decoration:none;
      color:var(--gold);
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      padding:18px 22px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      transition:0.35s ease;
      overflow:hidden;
      backdrop-filter:blur(10px);
    }

    .link-btn::before{
      content:'';
      position:absolute;
      width:0%;
      height:100%;
      background:linear-gradient(
      90deg,
      rgba(226,211,176,0.18),
      transparent
      );
      left:0;
      top:0;
      transition:0.4s ease;
    }

    .link-btn:hover::before{
      width:100%;
    }

    .link-btn:hover{
      transform:translateY(-4px) scale(1.01);
      border-color:rgba(226,211,176,0.3);
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .left{
      display:flex;
      align-items:center;
      gap:15px;
      z-index:2;
    }

    .icon{
      width:42px;
      height:42px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .link-btn span{
      font-weight:500;
      letter-spacing:0.5px;
    }

    .arrow{
      opacity:0.5;
      transition:0.3s ease;
      z-index:2;
    }

    .link-btn:hover .arrow{
      transform:translateX(4px);
      opacity:1;
    }

    .footer{
      margin-top:35px;
      text-align:center;
      font-size:0.85rem;
      color:rgba(255,255,255,0.35);
    }

    @media(max-width:500px){

      .card{
        padding:35px 20px;
      }

      .logo img{
        max-width:270px;
      }

      .link-btn{
        padding:16px;
      }
    }

  </style>
</head>
<body>

  <div class="particles"></div>

  <div class="container">

    <div class="card">

      <div class="logo">
        <img src="logo.jpg" alt="Farol Velho">
      </div>

      <p class="subtitle">
        Música e Arte
      </p>

      <div class="links">

        <a href="https://www.youtube.com/@BandaFarolVelho" class="link-btn">
          <div class="left">
            <div class="icon">
              <i data-feather="youtube"></i>
            </div>

            <span>YouTube</span>
          </div>

          <i class="arrow" data-feather="arrow-right"></i>
        </a>

        <a href="https://www.instagram.com/banda_farolvelho/" class="link-btn">
          <div class="left">
            <div class="icon">
              <i data-feather="instagram"></i>
            </div>

            <span>Instagram</span>
          </div>

          <i class="arrow" data-feather="arrow-right"></i>
        </a>

        <a href="#" class="link-btn">
          <div class="left">
            <div class="icon">
              <i data-feather="music"></i>
            </div>

            <span>SoundCloud</span>
          </div>

          <i class="arrow" data-feather="arrow-right"></i>
        </a>

        <a href="#" class="link-btn">
          <div class="left">
            <div class="icon">
              <i data-feather="disc"></i>
            </div>

            <span>Spotify</span>
          </div>

          <i class="arrow" data-feather="arrow-right"></i>
        </a>

      </div>

      <div class="footer">
        © 2026 Farol Velho
      </div>

    </div>

  </div>

  <script>

    feather.replace();

    const particles = document.querySelector('.particles');

    for(let i = 0; i < 50; i++){

      const span = document.createElement('span');

      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = 5 + Math.random() * 10 + 's';
      span.style.animationDelay = Math.random() * 5 + 's';

      particles.appendChild(span);
    }

  </script>

</body>
</html>
